*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:#0B1220;color:#EAF0F8;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center}
.lock{width:min(340px,88vw);text-align:center;padding-bottom:8vh}
.lock img{width:96px;height:96px;border-radius:22px;box-shadow:0 8px 30px rgba(52,211,153,.25)}

.sub{color:#93A4BE;font-size:13.5px;margin-bottom:22px}

.rem{display:flex;align-items:center;gap:8px;justify-content:center;margin:14px 0;color:#93A4BE;font-size:13.5px}
button{width:100%;padding:13px;border-radius:12px;border:0;background:#34D399;color:#06281c;font-size:16px;font-weight:700;cursor:pointer}
button:disabled{opacity:.55}
.err{color:#F87171;font-size:13.5px;min-height:20px;margin-top:12px}
#app{position:fixed;inset:0;width:100%;height:100%;border:0;display:none;background:#0B1220}

const u8=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const b64=b=>btoa(String.fromCharCode(...new Uint8Array(b)));
async function keyFromPw(pw){
 const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
 return crypto.subtle.deriveKey({name:"PBKDF2",salt:u8(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},true,["decrypt"]);}
async function decryptWith(key){
 const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:u8(IV)},key,u8(CT));
 return await new Response(new Blob([pt]).stream().pipeThrough(new DecompressionStream("gzip"))).text();}
function show(html){
 document.getElementById("app").srcdoc=html;
 document.getElementById("app").style.display="block";
 document.getElementById("relock").style.display="block";
 document.getElementById("lock").style.display="none";}
async function unlock(){
 const btn=document.getElementById("go"),err=document.getElementById("err");
 err.textContent="";btn.disabled=true;btn.textContent="Odszyfrowuję…";
 try{
  if(!window.DecompressionStream) throw new Error("old");
  const key=await keyFromPw(document.getElementById("pw").value.trim());
  const html=await decryptWith(key);
  if(document.getElementById("rem").checked)
    localStorage.setItem("pfk",b64(await crypto.subtle.exportKey("raw",key)));
  show(html);
 }catch(e){
  err.textContent=(String(e).includes("old"))?"Zaktualizuj iOS/Safari (min. 16.4)":"Złe hasło";
 }
 btn.disabled=false;btn.textContent="Odblokuj";}
document.getElementById("go").onclick=unlock;
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
document.getElementById("relock").onclick=()=>{localStorage.removeItem("pfk");location.reload();};
(async()=>{const k=localStorage.getItem("pfk");
 if(!k)return;
 try{const key=await crypto.subtle.importKey("raw",u8(k),"AES-GCM",true,["decrypt"]);show(await decryptWith(key));}
 catch(e){localStorage.removeItem("pfk");}})();
</script></body></html>
