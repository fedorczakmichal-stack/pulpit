<style>
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:radial-gradient(640px 420px at 50% 18%,#12233c,#0B1220 62%);color:#EAF0F8;
font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center}
.lock{width:min(340px,88vw);text-align:center;padding-bottom:8vh;animation:in .45s cubic-bezier(.2,.8,.3,1) both}
@keyframes in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.lock img{width:96px;height:96px;border-radius:23px;box-shadow:0 10px 36px rgba(52,211,153,.30),0 2px 10px rgba(0,0,0,.5)}
h1{font-size:22px;margin:18px 0 4px;letter-spacing:-.01em}
.sub{color:#93A4BE;font-size:13.5px;margin-bottom:22px}
input[type=password]{width:100%;padding:13px 14px;border-radius:13px;border:1px solid #2C405E;background:#132034;color:#EAF0F8;font-size:16px;outline:none;text-align:center;letter-spacing:.03em;transition:border-color .15s,box-shadow .15s}
input[type=password]:focus{border-color:#34D399;box-shadow:0 0 0 3px rgba(52,211,153,.18)}
.rem{display:flex;align-items:center;gap:8px;justify-content:center;margin:14px 0;color:#93A4BE;font-size:13.5px}
.rem input{accent-color:#34D399}
button{width:100%;padding:13px;border-radius:13px;border:0;background:#34D399;color:#06281c;font-size:16px;font-weight:700;cursor:pointer;transition:filter .15s,transform .08s}
button:active{transform:scale(.98)}button:hover{filter:brightness(1.06)}
button:disabled{opacity:.55}
.err{color:#F87171;font-size:13.5px;min-height:20px;margin-top:12px}
.shake{animation:sh .4s}
@keyframes sh{0%,100%{transform:none}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
@media(prefers-reduced-motion:reduce){.lock,.shake{animation:none}}

// SAMO-AKTUALIZACJA: iOS trzyma starą stronę w cache/procesie PWA. Przy starcie pobieramy
// świeży index (no-store) i porównujemy BUILD — inna wersja => przeładowanie (guard w sessionStorage).
const updP=(async()=>{try{
 const r=await Promise.race([fetch(location.pathname+"?u="+Date.now(),{cache:"no-store"}),
                             new Promise((_,j)=>setTimeout(j,2500))]);
 const t=await r.text(); const m=t.match(/BUILD="([a-f0-9]+)"/);
 if(m&&m[1]!==BUILD){ if(sessionStorage.getItem("pfu")!==m[1]){sessionStorage.setItem("pfu",m[1]);location.reload();return true;} }
 else if(m){sessionStorage.removeItem("pfu");}
}catch(e){} return false;})();
const u8=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const b64=b=>btoa(String.fromCharCode(...new Uint8Array(b)));
async function keyFromPw(pw){
 const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
 return crypto.subtle.deriveKey({name:"PBKDF2",salt:u8(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},true,["decrypt"]);}
async function decryptWith(key){
 const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:u8(IV)},key,u8(CT));
 return await new Response(new Blob([pt]).stream().pipeThrough(new DecompressionStream("gzip"))).text();}
function show(html){
 // SPŁASZCZENIE: hub staje się stroną (nie iframe) — menu scrolluje natywnie, pasek back klikalny.
 var rl='<button id="__rl" style="position:fixed;right:9px;bottom:calc(9px + env(safe-area-inset-bottom,0px));z-index:2147483647;background:rgba(19,32,52,.6);border:1px solid #22324C;border-radius:10px;color:#93A4BE;font-size:16px;padding:5px 9px;opacity:.55">&#128274;</button>'
   +'<'+'script>document.getElementById("__rl").onclick=function(){localStorage.removeItem("pfk");location.reload();};</'+'script>';
 html=html.replace("</body>",rl+"</body>");
 document.open();document.write(html);document.close();}
async function unlock(){
 const btn=document.getElementById("go"),err=document.getElementById("err");
 err.textContent="";btn.disabled=true;btn.textContent="Odszyfrowuję…";
 try{
  if(!window.DecompressionStream) throw new Error("old");
  const key=await keyFromPw(document.getElementById("pw").value.trim());
  const html=await decryptWith(key);
  if(document.getElementById("rem").checked)
    localStorage.setItem("pfk",b64(await crypto.subtle.exportKey("raw",key)));
  show(html);
 }catch(e){
  err.textContent=(String(e).includes("old"))?"Zaktualizuj iOS/Safari (min. 16.4)":"Złe hasło";
  var L=document.getElementById("lock");L.classList.remove("shake");void L.offsetWidth;L.classList.add("shake");
 }
 btn.disabled=false;btn.textContent="Odblokuj";}
document.getElementById("go").onclick=unlock;
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
(async()=>{const k=localStorage.getItem("pfk");
 if(!k)return;
 if(await updP)return;   // trwa przeładowanie na nową wersję — nie pokazuj starej
 try{const key=await crypto.subtle.importKey("raw",u8(k),"AES-GCM",true,["decrypt"]);show(await decryptWith(key));}
